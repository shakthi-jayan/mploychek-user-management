<div class="container-fluid min-vh-100 bg-light p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold">User Dashboard</h2>
      <p class="text-muted mb-0">Welcome back</p>
    </div>
    <button class="btn btn-danger" (click)="logout()">Logout</button>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-md-4">
      <div class="card shadow border-0 rounded-4 p-3">
        <h5>Total Records</h5>
        <h2 class="text-primary">12</h2>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow border-0 rounded-4 p-3">
        <h5>Verified</h5>
        <h2 class="text-success">8</h2>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card shadow border-0 rounded-4 p-3">
        <h5>Pending</h5>
        <h2 class="text-warning">4</h2>
      </div>
    </div>
  </div>

  <div class="card shadow border-0 rounded-4 p-4">
    <h4 class="mb-4">Verification Records</h4>
    <table class="table table-hover">
      <thead>
        <tr>
          <th>Verification</th>
          <th>Status</th>
          <th>Access Level</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Employment Check</td>
          <td><span class="badge bg-success">Verified</span></td>
          <td>General User</td>
        </tr>
        <tr>
          <td>Address Check</td>
          <td><span class="badge bg-warning text-dark">Pending</span></td>
          <td>General User</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
